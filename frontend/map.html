<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bit by Bit - Heatmap</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left">
      <a href="home.html" class="nav-link"> Home</a>
      <a href="account.html" class="nav-link"> Account</a>
      <a href="map.html" class="nav-link active"> Heatmap</a>
      <a href="progress.html" class="nav-link">Progress</a>
    </div>
    <button onclick="logout()" class="nav-logout-btn">Log Out</button>
  </nav>

  <main class="heatmap-page">
    <h1 class="page-title">Heatmap</h1>

    <div class="heatmap-card">
      <div id="monthLabels" class="month-labels"></div>

      <div class="heatmap-wrapper">
        <div class="day-labels">
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
            <span>Sun</span>
</div>

        <div id="heatmapGrid" class="heatmap-grid"></div>
      </div>

      <div class="heatmap-legend">
        <span>Less</span>
        <div class="legend-squares">
          <span class="day-square level-0"></span>
          <span class="day-square level-1"></span>
          <span class="day-square level-2"></span>
          <span class="day-square level-3"></span>
          <span class="day-square level-4"></span>
        </div>
        <span>More</span>
      </div>
    </div>
  </main>

<section class="weekly-summary-section">
  <h2 class="notes-title">Weekly Summary</h2>

  <div id="weeklySummaryGrid" class="weekly-summary-grid">
    <!-- JS will inject 7 day cards here -->
  </div>
</section>

  <!-- T26.3: Notes This Week section (Areebah) -->
<section class="notes-section">
  <h2 class="notes-title">Notes This Week</h2>
  <div class="notes-card">
    <table class="notes-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Habit</th>
          <th>Status</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody id="notesTableBody">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</section>

  <script src="js/map.js"></script>
</body>
</html>
