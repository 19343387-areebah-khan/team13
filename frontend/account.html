<!DOCTYPE html>
<html>
<head>
    <title>Account Settings - Bit by Bit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- T4.1 + T4.3: Navigation bar with links and logout button (Taran) -->
<!-- T5.R1, AC5.1, AC5.2: Restyled account page to match app design system (layout, fonts, colours) - Hamza -->



<nav class="top-nav">
  <div class="nav-links">
    <a href="home.html" class="nav-link">Home</a>
    <a href="account.html" class="nav-link active">Account</a>
    <a href="map.html" class="nav-link">Heatmap</a>
  </div>
  <button onclick="logout()" class="nav-logout-btn">Log Out</button>
</nav>

<div class="logo-wrapper">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <h1 class="app-title">Bit by Bit</h1>
  <p class="app-subtitle">Small Steps. Big Changes.</p>
</div>

<div class="container account-container">
  <h1>Account Settings</h1>

  <form id="account-form" class="styled-account-form">
    <div class="form-row">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>
    </div>

    <div class="form-row">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="form-row">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="Enter a new password" required minlength="6">
    </div>

    <button type="submit" class="btn-primary">Save Changes</button>
  </form>

  <p id="success-message" class="account-success" style="display:none;">Details updated successfully.</p>
</div>

<script src="./js/account.js"></script>

<script>
  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
