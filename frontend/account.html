<!DOCTYPE html>
<html>
<head>
    <title>Account Settings - Bit by Bit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- T4.1 + T4.3: Navigation bar with links and logout button (Taran) -->
<nav class="top-nav">
  <div class="nav-links">
    <a href="home.html" class="nav-link">🏠 Home</a>
    <a href="account.html" class="nav-link active">👤 Account</a>
    <a href="map.html" class="nav-link">Heatmap</a>
  </div>
  <button onclick="logout()" class="nav-logout-btn">Log Out</button>
</nav>

    <h1>Account Settings</h1>

    <form id="account-form">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name">
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email">
        </div>

        <div>
            <label for="password">New Password</label>
            <input type="password" id="password">
        </div>

        <button type="submit">Save Changes</button>
    </form>

    <p id="success-message" style="display:none;">Details updated successfully.</p>

    <script src="./js/account.js"></script>

 <script>
  function logout() {
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
