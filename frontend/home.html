<body>
  <!-- Navigation bar -->
  <nav style="display:flex; gap:20px; padding:10px; background:#F5F0E8;">
    <a href="home.html">Home</a>
    <a href="account.html">Account</a>

  <!-- logo -->
    <div class="logo-wrapper">
      <!-- checkmark icon in circle -->
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <!-- App name -->
      <h1 class="app-title">Bit by Bit</h1>
      <!-- Subtitle -->
      <p class="app-subtitle">Small Steps. Big Changes.</p>
    </div>

  <div class="container">
    <h1>My Habits</h1>

    <form id="habit-form">
      <div class="form-row">
        <label for="habit-name">Habit name</label>
        <input type="text" id="habit-name" placeholder="e.g. Drink water" required>
      </div>

      <div class="form-row">
        <label for="habit-type">Category</label>
        <select id="habit-type">
          <option value="health">Health</option>
          <option value="fitness">Fitness</option>
          <option value="mindfulness">Mindfulness</option>
          <option value="learning">Learning</option>
          <option value="other">Other</option>
        </select>
      </div>

      <button type="submit" class="btn-primary">Add Habit</button>
    </form>

    <div id="toast"></div>

    <h2 style="margin-top: 30px;">Today's Habits</h2>
    <div id="habit-list"></div>
  </div>

 <!-- Import the habits.js script -->
<script src="js/habits.js"></script>

<!-- Initialize rendering and form submission -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Render all habits on page load
    renderHabits();

    // Hook up form submission
    const habitForm = document.getElementById("habit-form");
    habitForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      const name = document.getElementById("habit-name").value.trim();
      const habitType = document.getElementById("habit-type").value;

      if (!name) return;

      const result = await createHabit(name, habitType);
      if (result.success) {
        document.getElementById("habit-name").value = "";
        document.getElementById("toast").textContent = "Habit added successfully";
        renderHabits();
      } else {
        document.getElementById("toast").textContent = result.error || "Failed to add habit";
      }
    });
  });
</script>
