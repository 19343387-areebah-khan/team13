<body>
  

  <!-- T4.1 + T4.3: Navigation bar with links and logout button (Taran) -->
<nav class="top-nav">
  <div class="nav-links">
    <a href="home.html" class="nav-link active"> Home</a>

    <!-- logo -->
    <div class="logo-wrapper">
      <!-- checkmark icon in circle -->
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <!-- App name -->
      <h1 class="app-title">Bit by Bit</h1>
      <!-- Subtitle -->
      <p class="app-subtitle">Small Steps. Big Changes.</p>
    </div>

  <div class="container">
    <h1>My Habits</h1>

    <form id="habit-form">
      <div class="form-row">
        <label for="habit-name">Habit name</label>
        <input type="text" id="habit-name" placeholder="e.g. Drink water" required>
      </div>

      <div class="form-row">
        <label for="habit-type">Category</label>
        <select id="habit-type">
          <option value="health">Health</option>
          <option value="fitness">Fitness</option>
          <option value="mindfulness">Mindfulness</option>
          <option value="learning">Learning</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-row">
        <label for="frequency">Frequnecy</label>
        <select id="frequency">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>

      <button type="submit" class="btn-primary">Add Habit</button>
    </form>

    <div id="toast"></div>

    <h2 style="margin-top: 30px;">Today's Habits</h2>
    <div id="habit-list"></div>
  </div>

<!-- T18.2 - Status Modal (Areebah Sprint 3) -->

<div id="status-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
  <div style="background:white; border-radius:12px; padding:24px; width:90%; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.2);">
    
    <h3 style="font-family:'Jost',sans-serif; color:#2B160B; margin:0 0 16px 0;">How did it go?</h3>
    
    <!-- Three status options -->
    <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
      
      <button type="button" id="btn-good" onclick="selectStatus('good')" 
        style="padding:12px; border-radius:8px; border:2px solid #ddd; background:white; font-family:'Jost',sans-serif; font-size:14px; cursor:pointer; text-align:left;">
        Good - completed without difficulty
      </button>
      
      <button type="button" id="btn-partial" onclick="selectStatus('partial')" 
        style="padding:12px; border-radius:8px; border:2px solid #ddd; background:white; font-family:'Jost',sans-serif; font-size:14px; cursor:pointer; text-align:left;">
        Partial - completed but was difficult
      </button>
      
      <button type="button" id="btn-not-complete" onclick="selectStatus('not_complete')" 
        style="padding:12px; border-radius:8px; border:2px solid #ddd; background:white; font-family:'Jost',sans-serif; font-size:14px; cursor:pointer; text-align:left;">
        Not Complete - didn't manage it today
      </button>
      
    </div>

    <!-- Note textarea - hidden by default, shown only for not_complete -->
    <div id="note-section" style="display:none; margin-bottom:16px;">
      <label style="font-family:'Jost',sans-serif; font-size:13px; color:#666; display:block; margin-bottom:6px;">Why didn't you complete it? (optional)</label>
      <textarea id="habit-note" rows="3" placeholder="e.g. ran out of time, felt unwell..." 
        style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; font-family:'Jost',sans-serif; font-size:14px; resize:none; box-sizing:border-box;"></textarea>
    </div>

    <!-- Error message -->
    <div id="modal-error" style="display:none; color:#c0392b; font-family:'Jost',sans-serif; font-size:13px; margin-bottom:12px;"></div>

    <!-- Confirm and Cancel buttons -->
    <div style="display:flex; gap:10px;">
      <button type="button" onclick="confirmStatus()" 
        style="flex:1; padding:12px; background:#D97757; color:white; border:none; border-radius:8px; font-family:'Jost',sans-serif; font-weight:bold; cursor:pointer;">
        Confirm
      </button>
      <button type="button" onclick="cancelModal()" 
        style="flex:1; padding:12px; background:#f5f5f5; color:#666; border:none; border-radius:8px; font-family:'Jost',sans-serif; cursor:pointer;">
        Cancel
      </button>
    </div>

  </div>
</div>

<!-- T11.3 - Edit Habit Modal -->
<div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
  <div style="background:white; border-radius:12px; padding:20px; width:90%; max-width:400px;">
    
    <h3 style="margin-bottom:10px;">Edit Habit</h3>

    <input id="edit-name" placeholder="Habit name" style="width:100%; margin-bottom:10px; padding:8px;">

    <select id="edit-type" style="width:100%; margin-bottom:15px; padding:8px;">
      <option value="health">Health</option>
      <option value="fitness">Fitness</option>
      <option value="mindfulness">Mindfulness</option>
      <option value="learning">Learning</option>
      <option value="other">Other</option>
    </select>

    <div style="display:flex; gap:10px;">
      <button onclick="submitEditHabit()" style="flex:1;">Save</button>
      <button onclick="closeEditModal()" style="flex:1;">Cancel</button>
    </div>

    <div id="edit-error" style="color:red; margin-top:10px;"></div>

  </div>
</div>

<!-- T31.1 - Delete Habit Confirmation Modal - Hamza-->
<div id="delete-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
  <div style="background:white; border-radius:12px; padding:24px; width:90%; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.2);">
    
    <h3 style="font-family:'Jost',sans-serif; color:#2B160B; margin:0 0 16px 0;">
      Delete Habit
    </h3>

    <p style="font-family:'Jost',sans-serif; font-size:14px; color:#666; margin:0 0 16px 0;">
      Are you sure you want to delete this habit?
    </p>

    <div id="delete-error" style="display:none; color:#c0392b; font-family:'Jost',sans-serif; font-size:13px; margin-bottom:12px;"></div>

    <div style="display:flex; gap:10px;">
      <button type="button" onclick="confirmDeleteHabit()" 
        style="flex:1; padding:12px; background:#D97757; color:white; border:none; border-radius:8px; font-family:'Jost',sans-serif; font-weight:bold; cursor:pointer;">
        Confirm
      </button>

      <button type="button" onclick="cancelDeleteHabit()" 
        style="flex:1; padding:12px; background:#f5f5f5; color:#666; border:none; border-radius:8px; font-family:'Jost',sans-serif; cursor:pointer;">
        Cancel
      </button>
    </div>
  </div>
</div>

  <script>

   const USER_ID = sessionStorage.getItem("user_id") || localStorage.getItem("user_id") || 1;

// T18.3, T18.4, T11.4 - Modal state variables (Areebah Sprint 3)
let currentHabitId = null;
let selectedStatus = null;
let editHabitId = null;
let deleteHabitId = null;
// T18.8 - Get visual state based on today_status (Areebah Sprint 3)
function getTickDisplay(habit) {
  if (habit.today_status === 'good') {
    return { classes: 'habit-check done good', text: '✓', color: '#D97757' };
  } else if (habit.today_status === 'partial') {
    return { classes: 'habit-check done partial', text: '✓', color: '#F5A97F' };
  } else if (habit.today_status === 'not_complete') {
    return { classes: 'habit-check not-complete', text: '✗', color: '#999' };
  } else {
    return { classes: 'habit-check', text: '', color: '' };
  }
}

async function loadHabits() {
  const res = await fetch(`/habits?user_id=${USER_ID}`);
  const data = await res.json();

  const list = document.getElementById("habit-list");
  list.innerHTML = "";

  if (!data.success || !data.habits.length) {
    list.innerHTML = "<p>You have no habits yet.</p>";
    return;
  }

  // T18.8 - render habits with status-based visual state
  data.habits.forEach(habit => {
    const tick = getTickDisplay(habit);
    const item = document.createElement("div");
    item.className = "habit-item" + (habit.today_status === 'good' || habit.today_status === 'partial' ? " completed" : "");
    item.id = `habit-${habit.habit_id}`;

    item.innerHTML = `
      <div class="habit-left">
        <div class="${tick.classes}" 
             onclick="openStatusModal(${habit.habit_id})"
             style="${tick.color ? `background:${tick.color}; border-color:${tick.color}; color:white;` : ''}">
          ${tick.text}
        </div>
        <div>
          <div class="habit-name">${habit.name}</div>
          <div class="habit-type">${habit.habit_type}</div>
        </div>
      </div>
      <button onclick="openEditModal(${habit.habit_id}, '${habit.name}', '${habit.habit_type}')"
          style="background:#3498db; color:white; border:none; padding:8px 10px; border-radius:6px; cursor:pointer; margin-right:5px;">
      Edit
      </button>
      <button onclick="openDeleteModal(${habit.habit_id})"
          style="background:#e74c3c; color:white; border:none; padding:8px 10px; border-radius:6px; cursor:pointer;">
      Delete
      </button>
    `;

    list.appendChild(item);
  });
}

// T18.4 - Intercept tick click, open modal instead of calling complete directly
function openStatusModal(habitId) {
  currentHabitId = habitId;
  selectedStatus = null;

  // reset modal state
  document.getElementById('btn-good').style.borderColor = '#ddd';
  document.getElementById('btn-good').style.background = 'white';
  document.getElementById('btn-partial').style.borderColor = '#ddd';
  document.getElementById('btn-partial').style.background = 'white';
  document.getElementById('btn-not-complete').style.borderColor = '#ddd';
  document.getElementById('btn-not-complete').style.background = 'white';
  document.getElementById('note-section').style.display = 'none';
  document.getElementById('habit-note').value = '';
  document.getElementById('modal-error').style.display = 'none';

  // show modal
  const modal = document.getElementById('status-modal');
  modal.style.display = 'flex';
}

// T11.4 
function openEditModal(habitId, name, type) {
  editHabitId = habitId;

  document.getElementById("edit-name").value = name;
  document.getElementById("edit-type").value = type;

  document.getElementById("edit-error").textContent = "";
  document.getElementById("edit-modal").style.display = "flex";
}

// T18.3 - Handle status option selection
function selectStatus(status) {
  selectedStatus = status;

  // reset all button styles
  document.getElementById('btn-good').style.borderColor = '#ddd';
  document.getElementById('btn-good').style.background = 'white';
  document.getElementById('btn-partial').style.borderColor = '#ddd';
  document.getElementById('btn-partial').style.background = 'white';
  document.getElementById('btn-not-complete').style.borderColor = '#ddd';
  document.getElementById('btn-not-complete').style.background = 'white';

  // highlight selected button
  const btnMap = { good: 'btn-good', partial: 'btn-partial', not_complete: 'btn-not-complete' };
  const selectedBtn = document.getElementById(btnMap[status]);
  selectedBtn.style.borderColor = '#D97757';
  selectedBtn.style.background = '#FDF5F0';

  // show note textarea only for not_complete
  document.getElementById('note-section').style.display = status === 'not_complete' ? 'block' : 'none';
}

// T18.3 - Cancel modal with no action
function cancelModal() {
  document.getElementById('status-modal').style.display = 'none';
  currentHabitId = null;
  selectedStatus = null;
}

// T11.4
function closeEditModal() {
  document.getElementById("edit-modal").style.display = "none";
  editHabitId = null;
}

// T18.5 - Confirm status and send to backend
async function confirmStatus() {
  if (!selectedStatus) {
    document.getElementById('modal-error').style.display = 'block';
    document.getElementById('modal-error').textContent = 'Please select an option before confirming.';
    return;
  }

  const note = document.getElementById('habit-note').value.trim();

  try {
    const res = await fetch('/habits/status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: USER_ID,
        habit_id: currentHabitId,
        status: selectedStatus,
        note: note
      })
    });

    const data = await res.json();

    if (data.success) {
      // close modal and reload habits to reflect new visual state
      document.getElementById('status-modal').style.display = 'none';
      currentHabitId = null;
      selectedStatus = null;
      loadHabits();
    } else {
      document.getElementById('modal-error').style.display = 'block';
      document.getElementById('modal-error').textContent = data.error || 'Something went wrong. Please try again.';
    }
  } catch (err) {
    document.getElementById('modal-error').style.display = 'block';
    document.getElementById('modal-error').textContent = 'Could not connect to server. Please try again.';
  }
}

document.getElementById("habit-form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("habit-name").value.trim();
  const habit_type = document.getElementById("habit-type").value;
  const frequency = document.getElementById("frequency").value;

  const res = await fetch("/habits", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: USER_ID, name, habit_type, frequency })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("habit-name").value = "";
    document.getElementById("toast").textContent = "Habit added successfully";
    loadHabits();
  } else {
    document.getElementById("toast").textContent = data.error || "Failed to add habit";
  }
});

// T31.1, T31.2, T31.3 - Handles delete confirmation modal: opens modal, cancels deletion, and confirms deletion via API - Hamza
function openDeleteModal(habitId) {
  deleteHabitId = habitId;
  document.getElementById("delete-error").style.display = "none";
  document.getElementById("delete-error").textContent = "";
  document.getElementById("delete-modal").style.display = "flex";
}

function cancelDeleteHabit() {
  document.getElementById("delete-modal").style.display = "none";
  document.getElementById("delete-error").style.display = "none";
  document.getElementById("delete-error").textContent = "";
  deleteHabitId = null;
}

async function confirmDeleteHabit() {
  if (!deleteHabitId) {
    document.getElementById("delete-error").style.display = "block";
    document.getElementById("delete-error").textContent = "No habit selected.";
    return;
  }

  try {
    const res = await fetch("/habits", {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: USER_ID,
        habit_id: deleteHabitId
      })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById("delete-modal").style.display = "none";
      deleteHabitId = null;
      loadHabits();
    } else {
      document.getElementById("delete-error").style.display = "block";
      document.getElementById("delete-error").textContent = data.error || "Failed to delete habit.";
    }
  } catch (err) {
    document.getElementById("delete-error").style.display = "block";
    document.getElementById("delete-error").textContent = "Could not connect to server.";
  }
}



// T11.3
async function submitEditHabit() {
  const name = document.getElementById("edit-name").value.trim();
  const habit_type = document.getElementById("edit-type").value;

  if (!name) {
    document.getElementById("edit-error").textContent = "Habit name is required";
    return;
  }

  try {
    const res = await fetch(`/habits/${editHabitId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: USER_ID,
        name: name,
        habit_type: habit_type
      })
    });

    const data = await res.json();

    if (data.success) {
      closeEditModal();
      loadHabits();
    } else {
      document.getElementById("edit-error").textContent = data.error;
    }

  } catch (err) {
    document.getElementById("edit-error").textContent = "Server error";
  }
}
    
loadHabits();

function logout() {
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = "login.html";
}


  </script>
</body>
